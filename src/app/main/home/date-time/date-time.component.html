<div class="date-time-container">
  <div class="time">
     <div class="hours-minutes">{{ time() | date: 'h:mm' }}</div>
     <div class="period-seconds-column">
        <div class="period">{{ time() | date: 'a'  }}</div>
        <div class="seconds">{{ time() | date: 'ss' }}</div>
     </div>
  </div>
  <div class="date">{{ time() | date: 'MMMM d' }}{{ dateSuffix() }}{{ time() | date: ', y' }}</div>
</div>
