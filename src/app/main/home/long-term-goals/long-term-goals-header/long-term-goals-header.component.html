<div class="long-term-goals-header-container">
  @if(isEditing()){
     <input class="long-term-title" [value]="title()" (keyup.enter)="onSave($event)" />
  } @else {
     <div class="long-term-title"> {{title()}} </div>
  }
  <button class="icon-button" (click)="onPencilClick()">
    <img class="pencil" src="images/edit.svg"/>
  </button>
  
</div>
