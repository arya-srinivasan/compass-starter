@if (goal) {
<div class="weekly-goals-item-container">
  <div class="container_1">
    <mat-checkbox class="check"></mat-checkbox>
    <div class="text_container">
      <div class="goal-title"> {{ goal()?.text }} </div>
      <div class="hashtag" [style.color]="hashtag()?.color"> 
        #{{ hashtag()?.name }} 
      </div>
    </div>
  </div>
</div>
}
