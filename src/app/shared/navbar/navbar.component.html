<div class="navbar-container">
 <img class="logo" src="images/logo.svg">
  @if (currentUser()) {
    <div class="user-setting-section">
      <img class="profile-pic" [src]= 'currentUser().photoURL' [matMenuTriggerFor]="menu" #menuTrigger/>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="logout()" class="logout">
          <mat-icon class="logout-icon">exit_to_app</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>  
  }
</div>
